<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login — Tour Bharat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 40px 44px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #334155;
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand .icon {
            width: 60px;
            height: 60px;
            background: #f59e0b20;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 1.6rem;
            color: #f59e0b;
        }

        .brand h4 {
            color: #f1f5f9;
            font-weight: 700;
            margin: 0;
        }

        .brand small {
            color: #64748b;
            font-size: 0.82rem;
        }

        label {
            color: #94a3b8;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f1f5f9;
            border-radius: 10px;
            padding: 12px 16px;
        }

        .form-control:focus {
            background: #0f172a;
            border-color: #f59e0b;
            color: #f1f5f9;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }

        .form-control::placeholder {
            color: #475569;
        }

        .btn-login {
            background: #f59e0b;
            color: #0f172a;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            font-size: 0.95rem;
            transition: background 0.18s;
        }

        .btn-login:hover {
            background: #d97706;
            color: #fff;
        }

        .alert {
            border-radius: 10px;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand">
            <div class="icon"><i class="fas fa-shield-halved"></i></div>
            <h4>Tour Bharat</h4>
            <small>Admin Control Panel</small>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} mb-3">{{ message }}</div>
        {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label><i class="fas fa-user me-1"></i> Username</label>
                <input type="text" name="username" class="form-control" placeholder="Username" required autocomplete="off">
            </div>
            <div class="mb-4">
                <label><i class="fas fa-lock me-1"></i> Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button class="btn-login"><i class="fas fa-right-to-bracket me-2"></i>Login to Dashboard</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
