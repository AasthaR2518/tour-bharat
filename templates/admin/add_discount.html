{% extends "admin/base.html" %}
{% block title %}Promotional Strategy | Tour Bharat Elite{% endblock %}

{% block admin_content %}

<!-- Sovereign Ambient Glows -->
<div class="ambient-glow" style="top: -200px; right: -200px;"></div>
<div class="ambient-glow" style="bottom: -100px; left: -100px; background: radial-gradient(circle, rgba(224, 168, 0, 0.03) 0%, transparent 70%);"></div>

<div class="mb-5 animate-fade-in" data-aos="fade-down">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h2 class="fw-900 text-white mb-1">Promotional Strategy</h2>
            <p class="text-muted mb-0">Launch exclusive discounts for our most elite expeditions.</p>
        </div>
        <a href="/admin/dashboard" class="btn btn-glass btn-sm rounded-pill px-4 border-secondary">
            <i class="fas fa-arrow-left me-2"></i> Cancel
        </a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass-panel p-5 shadow-2xl" data-aos="fade-up">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase ls-1">Select Expedition</label>
                    <select name="package_id" class="form-control form-control-premium" required>
                        <option value="">-- Choose Target Package --</option>
                        {% for pkg in packages %}
                        <option value="{{ pkg.id }}">{{ pkg.title }} (₹{{ pkg.price }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase ls-1">Discount Magnitude (%)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-gold border-end-0"><i class="fas fa-percentage"></i></span>
                        <input type="number" name="percentage" class="form-control form-control-premium border-start-0 ps-0" placeholder="15" min="1" max="99" required>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase ls-1">Commencement Date</label>
                        <input type="date" name="valid_from" class="form-control form-control-premium" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase ls-1">Expiration Date</label>
                        <input type="date" name="valid_to" class="form-control form-control-premium" required>
                    </div>
                </div>

                <div class="pt-4 border-top border-secondary">
                    <button type="submit" class="btn-premium w-100 py-3 shadow-lg">
                        Activate Promotion <i class="fas fa-bolt ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
