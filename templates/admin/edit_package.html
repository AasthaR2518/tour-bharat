{% extends "admin/base.html" %}
{% block title %}Edit Tour Packages | Tour Bharat Elite{% endblock %}

{% block admin_content %}

<!-- Sovereign Ambient Glows -->
<div class="ambient-glow" style="top: -200px; right: -200px;"></div>
<div class="ambient-glow" style="bottom: -100px; left: -100px; background: radial-gradient(circle, rgba(224, 168, 0, 0.03) 0%, transparent 70%);"></div>

<div class="mb-5 animate-fade-in" data-aos="fade-down">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h2 class="fw-900 text-white mb-1">Edit tour packages</h2>
            <p class="text-muted mb-0">Refining the details of a published luxury journey.</p>
        </div>
        <a href="/admin/packages" class="btn btn-glass btn-sm rounded-pill px-4 border-secondary">
            <i class="fas fa-arrow-left me-2"></i> Return to Directory
        </a>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="glass-panel p-5 shadow-2xl" data-aos="fade-up">
            <form method="POST" enctype="multipart/form-data">
                <div class="row g-4 mb-4">
                    <div class="col-md-8">
                        <label class="form-label small fw-bold text-muted text-uppercase ls-1">Tour Title</label>
                        <input type="text" name="title" class="form-control form-control-premium" value="{{ package.title }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase ls-1">Investment (₹)</label>
                        <input type="number" name="price" class="form-control form-control-premium" value="{{ package.price }}" required>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase ls-1">Duration (Days)</label>
                        <input type="number" name="days" class="form-control form-control-premium" value="{{ package.days }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase ls-1">Primary Location</label>
                        <input type="text" name="location" class="form-control form-control-premium" value="{{ package.location }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase ls-1">Update Tour Asset (Upload Image)</label>
                        <input type="file" name="image_file" class="form-control form-control-premium">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase ls-1">Current Asset Reference (Manual)</label>
                        <input type="text" name="image_text" class="form-control form-control-premium" value="{{ package.image }}">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase ls-1">Tour Narrative</label>
                    <textarea name="description" class="form-control form-control-premium" rows="4" required>{{ package.description }}</textarea>
                </div>

                <div class="mb-5">
                    <label class="form-label small fw-bold text-muted text-uppercase ls-1">Detailed Itinerary</label>
                    <textarea name="itinerary" class="form-control form-control-premium" rows="6">{{ package.itinerary }}</textarea>
                </div>

                <div class="pt-4 border-top border-secondary">
                    <button type="submit" class="btn-premium w-100 py-3 shadow-lg">
                        Finalize & Sync Changes <i class="fas fa-sync-alt ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
